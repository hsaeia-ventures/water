@if (isAuthenticated()) {
  <div class="app-layout">
    <!-- Minimalist Header -->
    <header class="app-header">
      <div class="app-header__container">
        
        <!-- Brand / Logo -->
        <a routerLink="/" class="app-brand" aria-label="Water Home">
          <app-icon name="water" class="app-brand__icon" />
          <span class="app-brand__text">Water</span>
        </a>

        <!-- Navigation / Inbox Badge -->
        <nav class="app-nav">
          <!-- Inbox action will be handled via routing. For now we use routerLink -->
          <a 
            routerLink="/inbox" 
            routerLinkActive="app-nav__link--active"
            class="app-nav__link" 
            aria-label="Go to Inbox">
            <app-icon name="inbox" [size]="20" />
            <span class="app-nav__label">Inbox</span>
            <app-inbox-badge />
          </a>

          <!-- Logout (Mobile only) -->
          <button
            (click)="logout()"
            class="app-nav__logout md:hidden"
            aria-label="Cerrar sesión">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:1.25rem;height:1.25rem">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
            </svg>
          </button>
        </nav>

      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
      <div class="app-main__container flex gap-8">
        
        <!-- Sidebar Navigation (Desktop Only) -->
        <aside class="hidden md:block w-64 flex-shrink-0">
          <app-sidebar />
        </aside>
        
        <div class="flex-1 w-full min-w-0">
          <router-outlet />
        </div>
        
      </div>
    </main>

    <!-- Global Omni-FAB (Mobile Only) -->
    <app-omni-fab />

    <!-- Global Capture Interfaces -->
    <app-capture-bottom-sheet />
    <app-capture-spotlight />

    <!-- Global Dialog (z-200, always on top) -->
    <app-dialog />
  </div>
} @else {
  <router-outlet></router-outlet>
}
